
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flood It</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
         <!-- Navigation -->
    <nav style="padding: 20px 0; border-bottom: 1px solid rgba(111, 66, 193, 0.3);">
        <div class="container">
         <a href="../index.html" class="go_home" onclick="goHome()">🏠 Home</a>
            </a>
        </div>
    </nav>
    <main class="app">
      <header class="topbar">
        <div class="titleblock">
          <h1>Flood It</h1>
          <p class="subtitle">Fill the entire board with one color in as few moves as possible.</p>
        </div>

        <div class="stats">
          <div class="stat">
            <span class="label">Moves</span>
            <span id="moves" class="value">0</span>
          </div>
          <div class="stat">
            <span class="label">Best</span>
            <span id="best" class="value">—</span>
          </div>
          <button id="newGame" class="btn" type="button">New Game</button>
        </div>
      </header>

      <section class="boardWrap" aria-label="Game board">
        <div id="board" class="board" role="grid" aria-label="Flood It grid"></div>
      </section>

      <section class="controls" aria-label="Color controls">
        <div class="paletteHeader">
          <span class="hint">Pick a color to flood from the top-left.</span>
          <span id="status" class="status" aria-live="polite"></span>
        </div>
        <div id="palette" class="palette" role="group" aria-label="Color choices"></div>
      </section>

      <footer class="footer">
        <small>
          Rules: Start at the top-left. Each move picks a color and floods adjacent squares of that color.
        </small>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
